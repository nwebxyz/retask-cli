syntax = "proto3";
package project.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "auth/v1/user_access.proto";
import "common/v1/common.proto";
import "common/v1/nrn.proto";
import "common/v1/soft_delete.proto";
import "workspace/v1/workspace.proto";

option go_package = "nweb.xyz/go/api-contracts-gen/project/v1";

service ProjectService {
  rpc GetProjects(ProjectsRequest) returns (ProjectsResponse) {
    option (google.api.http) = {get: "/v1/projects"};
  }
  rpc GetProject(.common.v1.Id) returns (Project) {
    option (google.api.http) = {get: "/v1/projects/{id}"};
  }
  rpc GetProjectByKey(ProjectByKeyRequest) returns (Project) {
    option (google.api.http) = {get: "/v1/projects:by-key"};
  }
  rpc SetProject(Project) returns (.common.v1.Id) {
    option (google.api.http) = {
      post: "/v1/projects"
      body: "*"
    };
  }
  rpc ArchiveProject(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {post: "/v1/projects/{id}:archive"};
  }
  rpc UnarchiveProject(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {post: "/v1/projects/{id}:unarchive"};
  }
  rpc DeleteProject(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {delete: "/v1/projects/{id}"};
  }

  rpc GetProjectMembers(ProjectMembersRequest) returns (ProjectMembersResponse) {
    option (google.api.http) = {get: "/v1/projects/{project_id}/members"};
  }
  rpc SetProjectMember(ProjectMember) returns (.common.v1.Empty) {
    option (google.api.http) = {
      post: "/v1/projects/{project_id}/members"
      body: "*"
    };
  }
  rpc RemoveProjectMember(RemoveProjectMemberRequest) returns (.common.v1.Empty) {
    option (google.api.http) = {delete: "/v1/projects/{project_id}/members"};
  }

  rpc CheckProjectPermissions(CheckProjectPermissionsRequest) returns (CheckProjectPermissionsResponse) {
    option (google.api.http) = {
      post: "/v1/projects:check-permissions"
      body: "*"
    };
  }

  rpc GetProjectsUsage(ProjectsUsageRequest) returns (ProjectsUsage) {
    option (google.api.http) = {get: "/v1/projects:usage"};
  }
}

enum Visibility {
  VISIBILITY_WORKSPACE_EDIT = 0;
  VISIBILITY_WORKSPACE_VIEW = 1;
  VISIBILITY_RESTRICTED     = 2;
}

enum MemberRole {
  MEMBER_ROLE_VIEWER = 0;
  MEMBER_ROLE_EDITOR = 1;
  MEMBER_ROLE_ADMIN  = 2;
}

message Project {
  // Identity
  // @inject_tag: bson:"_id,omitempty"
  string project_id   = 1;
  // @inject_tag: bson:"workspace_id"
  string workspace_id = 2;
  // @inject_tag: bson:"key"
  string key          = 3;

  // Display
  // @inject_tag: bson:"name"
  string name         = 4;
  // @inject_tag: bson:"description"
  string description  = 5;
  // @inject_tag: bson:"color"
  string color        = 6;
  // @inject_tag: bson:"icon"
  string icon         = 7;

  // Settings
  // @inject_tag: bson:"visibility"
  Visibility visibility = 8;
  // @inject_tag: bson:"is_archived"
  bool is_archived      = 9;

  // Audit
  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn            created_by_nrn = 10;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at     = 11;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn            updated_by_nrn = 12;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at     = 13;

  // Soft delete
  // @inject_tag: bson:"is_deleted"
  bool                    is_deleted    = 14;
  // @inject_tag: bson:"deletion_info,omitempty"
  .common.v1.DeletionInfo deletion_info = 15;

  // Computed on read — never persisted
  // @inject_tag: bson:"-"
  ProjectUserAccess user_access = 16;
}

message ProjectsRequest {
  message Filter {
    repeated string project_ids  = 1;
    string workspace_id          = 2;
    .common.v1.YesNo is_archived = 3;
    .common.v1.Nrn owner_nrn    = 4;
  }
  enum Sort {
    SORT_DEFAULT = 0;
    SORT_DATE_A  = 1;
    SORT_DATE_D  = 2;
  }
  Filter filter                    = 1;
  Sort sort                        = 2;
  .common.v1.Pagination pagination = 3;
}

message ProjectsResponse {
  repeated Project projects = 1;
}

message ProjectByKeyRequest {
  string workspace_id = 1;
  string key          = 2;
}

message WorkspaceMemberSnapshot {
  // @inject_tag: bson:"workspace_member_id"
  string workspace_member_id = 1;
  // @inject_tag: bson:"workspace_id"
  string workspace_id        = 2;
  // @inject_tag: bson:"role"
  .workspace.v1.WorkspaceMemberRole role = 3;
  // @inject_tag: bson:"display_name"
  string display_name = 4;
  // @inject_tag: bson:"user_nrn"
  .common.v1.Nrn user_nrn = 5;
  // Snapshot of customer profile, copied from WorkspaceMember.
  // @inject_tag: bson:"member_profile"
  .workspace.v1.MemberProfile member_profile = 6;
  // @inject_tag: bson:"snapshot_at"
  google.protobuf.Timestamp snapshot_at = 7;
}

message ProjectMember {
  // @inject_tag: bson:"_id,omitempty"
  string project_member_id = 1;
  // @inject_tag: bson:"project_id"
  string project_id        = 2;
  // @inject_tag: bson:"role"
  MemberRole role          = 3;
  // Workspace member snapshot — set for workspace users.
  // @inject_tag: bson:"member"
  WorkspaceMemberSnapshot member = 4;
  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn created_by_nrn = 5;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 6;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn updated_by_nrn = 7;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 8;
}

message ProjectMembersResponse {
  repeated ProjectMember members = 1;
}

message ProjectMembersRequest {
  string project_id         = 1;
  repeated MemberRole roles = 2;
}

message RemoveProjectMemberRequest {
  string project_id        = 1;
  string project_member_id = 2;
}

message CheckProjectPermissionsRequest {
  .common.v1.Nrn user_nrn          = 1;
  MemberRole required_role          = 2;
  string workspace_id               = 3;
  repeated string project_ids       = 4;
}

// ProjectUserAccess wraps auth.v1.UserAccess with the caller's effective
// project role. The effective role mixes project membership with the
// caller's workspace role (e.g. workspace OWNER/ADMIN is elevated on
// projects). Populated by the server on read; never persisted.
message ProjectUserAccess {
  .auth.v1.UserAccess access = 1;
  MemberRole effective_role  = 2;
}

message CheckProjectPermissionsResponse {
  repeated ProjectPermission permissions = 1;
}

message ProjectPermission {
  string project_id         = 1;
  MemberRole effective_role = 2;
}

message ProjectsUsageRequest {
  string workspace_id = 1;
}

message ProjectsUsage {
  // Non-deleted, including archived (counts toward max_projects_per_workspace)
  uint32 total_projects    = 1;
  // Subset of total_projects where is_archived = true
  uint32 archived_projects = 2;
}
