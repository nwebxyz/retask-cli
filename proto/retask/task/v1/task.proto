syntax = "proto3";
package retask.task.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "common/v1/nrn.proto";
import "common/v1/soft_delete.proto";
import "file/v1/file.proto";
import "retask/common/v1/source.proto";
import "retask/common/v1/types.proto";

service TaskService {
  rpc GetTasks(TasksRequest) returns (TasksResponse) {
    option (google.api.http) = {get: "/retask/v1/tasks"};
  }
  rpc GetTask(.common.v1.Id) returns (Task) {
    option (google.api.http) = {get: "/retask/v1/tasks/{id}"};
  }
  rpc GetTaskByKey(TaskByKeyRequest) returns (Task) {
    option (google.api.http) = {get: "/retask/v1/tasks:by-key"};
  }
  rpc SetTask(Task) returns (.common.v1.Id) {
    option (google.api.http) = {
      post: "/retask/v1/tasks"
      body: "*"
    };
  }
  rpc DeleteTask(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {delete: "/retask/v1/tasks/{id}"};
  }
  rpc SetPartialTask(.common.v1.PartialData) returns (.common.v1.Id) {
    option (google.api.http) = {
      patch: "/retask/v1/tasks/{id}"
      body: "*"
    };
  }
  rpc AddTaskAttachment(AddTaskAttachmentRequest) returns (Task) {
    option (google.api.http) = {
      post: "/retask/v1/tasks/{task_id}/attachments"
      body: "*"
    };
  }
  rpc DeleteTaskAttachment(DeleteTaskAttachmentRequest) returns (Task) {
    option (google.api.http) = {
      delete: "/retask/v1/tasks/{task_id}/attachments/{file_id}"
    };
  }

  rpc GetTasksUsage(TasksUsageRequest) returns (TasksUsage) {
    option (google.api.http) = {get: "/retask/v1/tasks:usage"};
  }
}

message ExternalSource {
  // @inject_tag: bson:"source_type"
  retask.common.v1.SourceType source_type = 1;
  // @inject_tag: bson:"source_id"
  string source_id = 2;
  // @inject_tag: bson:"source_url"
  string source_url = 3;
  // @inject_tag: bson:"source_key"
  string source_key = 4;
}

message Task {
  enum Priority {
    UNKNOWN = 0;
    LOW = 1;
    MEDIUM = 2;
    HIGH = 3;
    URGENT = 4;
  }

  // === Identity ===
  // @inject_tag: bson:"_id,omitempty"
  string task_id = 1;
  // @inject_tag: bson:"project_id"
  string project_id = 2;
  // @inject_tag: bson:"workspace_id"
  string workspace_id = 3;
  // parent_nrn links this task to a parent resource. Can be a parent Task NRN
  // (subtask relationship) or another resource NRN such as a Note
  // (tasks auto-created from a user's quick note). Empty = top-level task.
  // @inject_tag: bson:"parent_nrn,omitempty"
  .common.v1.Nrn parent_nrn = 4;
  // @inject_tag: bson:"sequence_number"
  uint64 sequence_number = 5;
  // @inject_tag: bson:"key"
  string key = 6;

  // === Content ===
  // @inject_tag: bson:"title"
  string title = 7;
  // @inject_tag: bson:"description"
  string description = 8;
  // @inject_tag: bson:"sort_order"
  uint64 sort_order = 9;

  // === Classification ===
  // @inject_tag: bson:"status"
  retask.common.v1.TaskStatus status = 10;
  // @inject_tag: bson:"task_type"
  retask.common.v1.TaskType task_type = 11;
  // @inject_tag: bson:"priority"
  Priority priority = 12;
  // estimation_points is the effort estimate in story/effort points.
  // 0 means unestimated (sentinel for "not yet estimated").
  // @inject_tag: bson:"estimation_points"
  uint32 estimation_points = 13;

  // === People ===
  // reporter_nrn is the Workspace Member NRN of the task reporter — the
  // person on whose behalf the task was raised. Defaults to created_by_nrn
  // on create if unset. Mutable after creation via SetPartialTask.
  // Format: "nweb:workspace:member:<uuid>"
  // @inject_tag: bson:"reporter_nrn,omitempty"
  .common.v1.Nrn reporter_nrn = 14;
  // Assignee NRNs use Workspace Member NRN format:
  // "nweb:workspace:member:<uuid>"
  // @inject_tag: bson:"assignee_nrns"
  repeated .common.v1.Nrn assignee_nrns = 15;

  // === Timing ===
  // @inject_tag: bson:"due_at"
  google.protobuf.Timestamp due_at = 16;

  // === Attachments ===
  // attachments is a snapshot of FileInfo captured at the time each file was
  // attached. Modified only via AddTaskAttachment / DeleteTaskAttachment.
  // @inject_tag: bson:"attachments"
  repeated file.v1.FileInfo attachments = 17;

  // === External source ===
  // @inject_tag: bson:"external_source,omitempty"
  ExternalSource external_source = 18;
  // @inject_tag: bson:"external_fields,omitempty"
  map<string, string> external_fields = 19;

  // === Audit / soft-delete ===
  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn created_by_nrn = 20;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 21;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn updated_by_nrn = 22;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 23;
  // @inject_tag: bson:"status_updated_by_nrn"
  .common.v1.Nrn status_updated_by_nrn = 24;
  // @inject_tag: bson:"status_updated_at"
  google.protobuf.Timestamp status_updated_at = 25;
  // @inject_tag: bson:"is_deleted"
  bool is_deleted = 26;
  // @inject_tag: bson:"deletion_info,omitempty"
  .common.v1.DeletionInfo deletion_info = 27;
}

message TasksRequest {
  message Filter {
    repeated string task_ids = 1;
    repeated string project_ids = 2;
    string workspace_id = 3;
    string parent_nrn = 4;
    repeated string status_ids = 5;
    repeated string type_ids = 6;
    Task.Priority priority = 7;
    // assignee_nrns filters tasks by assignee. An empty string ("") is a
    // sentinel that matches unassigned tasks (no assignees). Empty string
    // and real NRNs may be combined: e.g. ["", "nweb:workspace:member:abc"]
    // returns tasks that are unassigned OR assigned to that member.
    repeated string assignee_nrns = 8;
  }
  enum Sort {
    DEFAULT = 0;           // priority DESC, then status.sort_order DESC
    CREATED_AT_ASC = 1;
    CREATED_AT_DESC = 2;
    UPDATED_AT_ASC = 3;
    UPDATED_AT_DESC = 4;   // non-NULL first
    DUE_AT_ASC = 5;
    DUE_AT_DESC = 6;       // non-NULL first
    STATUS_ASC = 7;        // status.sort_order ASC
    STATUS_DESC = 8;       // status.sort_order DESC
    TYPE_ASC = 9;          // task_type.sort_order ASC
    TYPE_DESC = 10;        // task_type.sort_order DESC
    PRIORITY_ASC = 11;
    PRIORITY_DESC = 12;
    ASSIGNEE_ASC = 13;     // first assignee_nrn entity ID ASC
    ASSIGNEE_DESC = 14;    // first assignee_nrn entity ID DESC
  }
  Filter filter = 1;
  Sort sort = 2;
  .common.v1.Pagination pagination = 3;
}

message TasksResponse {
  repeated Task tasks = 1;
}

message TaskByKeyRequest {
  string workspace_id = 1;
  string key = 2;
}

message AddTaskAttachmentRequest {
  string task_id = 1;
  string file_id = 2;
}

message DeleteTaskAttachmentRequest {
  string task_id = 1;
  string file_id = 2;
}

message TasksUsageRequest {
  string workspace_id         = 1;
  // Optional. Omit to get counts for all projects in the workspace.
  repeated string project_ids = 2;
}

message TasksUsage {
  message ProjectCount {
    string project_id  = 1;
    uint32 total_tasks = 2;
  }
  repeated ProjectCount by_project = 1;
}
