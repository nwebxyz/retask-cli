syntax = "proto3";
package retask.agent.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "common/v1/nrn.proto";
import "common/v1/soft_delete.proto";
import "workspace/v1/sharing.proto";
import "retask/sandbox/v1/sandbox.proto";

service AgentService {
  // === Agent CRUD ===
  rpc GetAgents(AgentsRequest) returns (AgentsResponse) {
    option (google.api.http) = {get: "/retask/v1/agents"};
  }
  rpc GetAgent(.common.v1.Id) returns (Agent) {
    option (google.api.http) = {get: "/retask/v1/agents/{id}"};
  }
  rpc SetAgent(Agent) returns (.common.v1.Id) {
    option (google.api.http) = {
      post: "/retask/v1/agents"
      body: "*"
    };
  }
  rpc DeleteAgent(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {delete: "/retask/v1/agents/{id}"};
  }

  // === Suggestions ===
  rpc GetSuggestedAgents(SuggestedAgentsRequest) returns (SuggestedAgentsResponse) {
    option (google.api.http) = {get: "/retask/v1/agents:suggested"};
  }
}

// ============================================================================
// Agent
// ============================================================================

message Agent {
  enum Role {
    ROLE_UNKNOWN        = 0;
    ROLE_TASK_PLANNER   = 1;
    ROLE_TASK_PROCESSOR = 2;
  }

  message Trigger {
    enum Event {
      EVENT_UNKNOWN             = 0;
      EVENT_TASK_STATUS_CHANGED = 1;
    }

    message TaskStatusChangedConfig {
      // @inject_tag: bson:"task_status_ids"
      repeated string task_status_ids    = 1;
      // @inject_tag: bson:"target_project_ids"
      repeated string target_project_ids = 2;
    }

    // @inject_tag: bson:"event"
    Event                   event               = 1;
    // @inject_tag: bson:"task_status_changed,omitempty"
    TaskStatusChangedConfig task_status_changed = 2;
  }

  // @inject_tag: bson:"_id,omitempty"
  string agent_id = 1;
  // @inject_tag: bson:"workspace_id"
  string workspace_id = 2;
  // @inject_tag: bson:"owner_nrn"
  .common.v1.Nrn owner_nrn = 3;
  // @inject_tag: bson:"name"
  string name = 4;
  // @inject_tag: bson:"description"
  string description = 5;
  // @inject_tag: bson:"email"
  string email = 6;
  // @inject_tag: bson:"icon"
  .common.v1.Icon icon = 7;
  // @inject_tag: bson:"role"
  Role role = 8;
  // @inject_tag: bson:"integration_provider_ids"
  repeated string integration_provider_ids = 9;
  // @inject_tag: bson:"sandbox_template_id,omitempty"
  string sandbox_template_id = 10;
  // Not stored in MongoDB — populated on-the-fly from sandbox_template_id.
  // @inject_tag: bson:"-"
  .retask.sandbox.v1.SandboxTemplate sandbox_template = 11;
  // Empty: agent executes on any available sandbox.
  // Sandbox NRN: agent is pinned to that specific sandbox.
  // @inject_tag: bson:"execution_target_nrn,omitempty"
  .common.v1.Nrn execution_target_nrn = 12;
  // @inject_tag: bson:"trigger,omitempty"
  Trigger trigger = 13;
  // @inject_tag: bson:"sharing"
  .workspace.v1.Sharing sharing = 14;

  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn created_by_nrn = 15;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn updated_by_nrn = 16;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 17;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 18;

  // @inject_tag: bson:"is_deleted"
  bool is_deleted = 19;
  // @inject_tag: bson:"deletion_info,omitempty"
  .common.v1.DeletionInfo deletion_info = 20;
}

// ============================================================================
// Request / Response — Agent
// ============================================================================

message AgentsRequest {
  message Filter {
    string workspace_id       = 1;
    repeated string agent_ids = 2;
    repeated Agent.Role roles = 3;
  }
  enum Sort {
    DEFAULT         = 0;
    CREATED_AT_ASC  = 1;
    CREATED_AT_DESC = 2;
    NAME_ASC        = 3;
    NAME_DESC       = 4;
  }
  Filter                filter     = 1;
  Sort                  sort       = 2;
  .common.v1.Pagination pagination = 3;
}

message AgentsResponse {
  repeated Agent agents = 1;
}

message SuggestedAgentsRequest {
  string workspace_id = 1;
}

message SuggestedAgentsResponse {
  repeated Agent agents = 1;
}
