syntax = "proto3";
package integration.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "common/v1/nrn.proto";

// ============================================================================
// Provider
// ============================================================================

// Provider is a read-only catalog row managed via migrations.
// Engineers seed these directly; no public write RPCs yet.
message Provider {
  // @inject_tag: bson:"_id,omitempty"
  // String key, e.g. "github", "anthropic", "openai".
  string provider_id = 1;
  // @inject_tag: bson:"name"
  string name = 2;
  // @inject_tag: bson:"logo,omitempty"
  string logo = 3;

  // Auth method gating. Both default false; at least one must be enabled
  // for the provider to be usable. FE uses these to render the right
  // Connect UI.
  // @inject_tag: bson:"disable_oauth_flow"
  bool disable_oauth_flow = 4;
  // @inject_tag: bson:"disable_access_token"
  bool disable_access_token = 5;

  // OAuth authorize URL template. Empty for MVP or providers without OAuth.
  // @inject_tag: bson:"oauth_authorize_url,omitempty"
  string oauth_authorize_url = 6;

  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 7;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 8;

  // Env vars this provider injects into a sandbox at session start.
  // Values are either a fixed string or "{{accessToken}}" which is
  // substituted with the resolved plaintext access token at runtime.
  // Example for Anthropic:
  //   { name: "ANTHROPIC_API_KEY",  value: "{{accessToken}}" }
  //   { name: "ANTHROPIC_BASE_URL", value: "https://api.anthropic.com" }
  message SandboxEnvVar {
    // @inject_tag: bson:"name"
    string name  = 1;
    // @inject_tag: bson:"value"
    string value = 2;
  }
  // @inject_tag: bson:"sandbox_env_vars"
  repeated SandboxEnvVar sandbox_env_vars = 9;
}

// ============================================================================
// GitRepo
// ============================================================================

// Provider-neutral git repository clone config. Used by GithubSettings
// (and future GitlabSettings, etc.) and by retask.sandbox.v1.Sandbox.Config.
message GitRepo {
  // @inject_tag: bson:"url"
  string url        = 1;   // clone URL — used as key to match
  // @inject_tag: bson:"branch"
  string branch     = 2;
  // @inject_tag: bson:"target_dir"
  string target_dir = 3;
}

// ============================================================================
// GithubSettings
// ============================================================================

// Provider-specific settings for GitHub integrations.
message GithubSettings {
  message RepoSettings {
    // @inject_tag: bson:"git_repo"
    GitRepo git_repo = 1;
    // @inject_tag: bson:"enabled"
    bool    enabled  = 2;
  }
  // @inject_tag: bson:"repos"
  // Empty means no GitHub repo access. When non-empty, AccessIntegration
  // returns only enabled entries; sandbox clones them using the configured
  // branch and target_dir.
  repeated RepoSettings repos = 1;
}

// ============================================================================
// Integration
// ============================================================================

message Integration {
  enum Level {
    LEVEL_UNKNOWN   = 0;
    LEVEL_WORKSPACE = 1;   // admin-managed, shared across all workspace members
    LEVEL_MEMBER    = 2;   // private to one workspace member
  }

  enum AccessLevel {
    ACCESS_LEVEL_UNKNOWN = 0;
    ACCESS_LEVEL_READ    = 1;
    ACCESS_LEVEL_WRITE   = 2;
    ACCESS_LEVEL_ADMIN   = 3;   // provider-dependent
  }

  message Credentials {
    // Transient: populated on SetIntegration, stripped before DB storage
    // (bson:"-"). Plaintext stored in secret-manager; re-injected on
    // AccessIntegration only.
    // @inject_tag: bson:"-"
    string access_token = 1;
    // @inject_tag: bson:"access_token_secret_nrn"
    .common.v1.Nrn access_token_secret_nrn = 2;
    // @inject_tag: bson:"access_token_masked"
    string access_token_masked = 3;

    // Refresh token. Empty for access-token integrations and OAuth tokens
    // that don't expire.
    // @inject_tag: bson:"-"
    string refresh_token = 4;
    // @inject_tag: bson:"refresh_token_secret_nrn,omitempty"
    .common.v1.Nrn refresh_token_secret_nrn = 5;
    // @inject_tag: bson:"refresh_token_masked,omitempty"
    string refresh_token_masked = 6;
  }

  message ExternalAccount {
    // Provider-assigned user/org id (e.g. GitHub numeric user id).
    // @inject_tag: bson:"id"
    string id = 1;
    // @inject_tag: bson:"name"
    string name = 2;
    // @inject_tag: bson:"avatar,omitempty"
    string avatar = 3;
  }

  // @inject_tag: bson:"_id,omitempty"
  string integration_id = 1;
  // @inject_tag: bson:"workspace_id"
  string workspace_id = 2;
  // @inject_tag: bson:"provider_id"
  string provider_id = 3;
  // @inject_tag: bson:"level"
  Level level = 4;
  // For LEVEL_MEMBER: WorkspaceMember.workspace_member_id of the owner.
  // Empty for LEVEL_WORKSPACE. Always overwritten server-side from the
  // caller's auth context — never trusted from the request body.
  // @inject_tag: bson:"owner_member_id,omitempty"
  string owner_member_id = 5;
  // @inject_tag: bson:"access_level"
  AccessLevel access_level = 6;

  // Granted scopes from OAuth token response. Empty for access-token
  // integrations (scopes are not verified in MVP).
  // @inject_tag: bson:"granted_scopes"
  repeated string granted_scopes = 7;

  // Identity of the connected external account, fetched once at connect
  // time. Used for "Connected as @octocat" display.
  // @inject_tag: bson:"external_account,omitempty"
  ExternalAccount external_account = 8;

  // Token expiry. Empty for access-token integrations and non-expiring
  // OAuth tokens. AccessIntegration returns FAILED_PRECONDITION if
  // now() > expires_at.
  // @inject_tag: bson:"expires_at,omitempty"
  google.protobuf.Timestamp expires_at = 9;

  // @inject_tag: bson:"credentials"
  Credentials credentials = 10;

  // Audit (hard-delete only — no is_deleted / deletion_info fields).
  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn created_by_nrn = 11;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 12;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn updated_by_nrn = 13;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 14;
  // Updated on each successful AccessIntegration. Used for "last used X
  // ago" display and future inactivity cleanup.
  // @inject_tag: bson:"last_used_at,omitempty"
  google.protobuf.Timestamp last_used_at = 15;

  // Per-integration overrides of Provider.sandbox_env_vars. Matched by
  // name. overridden_name and overridden_value are each optional: an
  // empty field means "keep the provider's value".
  message SandboxEnvVarOverride {
    // @inject_tag: bson:"name"
    // Must match a Provider.SandboxEnvVar.name.
    string name             = 1;
    // @inject_tag: bson:"overridden_name,omitempty"
    string overridden_name  = 2;
    // @inject_tag: bson:"overridden_value,omitempty"
    string overridden_value = 3;
  }
  // @inject_tag: bson:"sandbox_env_var_overrides"
  repeated SandboxEnvVarOverride sandbox_env_var_overrides = 16;

  // Provider-specific settings. Only the field matching provider_id is set.
  // AccessIntegration applies provider-specific filtering before returning
  // (e.g. github.repos is filtered to enabled entries only).
  // @inject_tag: bson:"provider_settings,omitempty"
  oneof provider_settings {
    GithubSettings github = 17;
  }
}

// ============================================================================
// Request / Response — Provider
// ============================================================================

message ProvidersRequest {
  message Filter {
    // Optional. When empty, all providers are returned.
    repeated string provider_ids = 1;
  }
  Filter filter = 1;
}

message ProvidersResponse {
  repeated Provider providers = 1;
}

// ============================================================================
// Request / Response — Integration
// ============================================================================

message IntegrationsRequest {
  message Filter {
    // Required. Scopes the query to a single workspace.
    string workspace_id = 1;
    // Optional.
    repeated string integration_ids = 2;
    // Optional. Multi-select filter by provider.
    repeated string provider_ids = 3;
  }
  Filter filter = 1;
}

message IntegrationsResponse {
  repeated Integration integrations = 1;
}

message AccessIntegrationRequest {
  // Required.
  string workspace_id = 1;
  // Required.
  string provider_id = 2;
  // Optional. When set, MEMBER-level integration for this member is tried
  // first before falling back to WORKSPACE. Should be the
  // WorkspaceMember.workspace_member_id of the session owner, resolved by
  // the calling service (e.g. sandbox service from Session.workspace_member_id).
  // Empty means skip MEMBER lookup and go straight to WORKSPACE.
  string workspace_member_id = 3;
}

message AccessIntegrationResponse {
  // The resolved Integration. credentials.access_token and
  // credentials.refresh_token are populated with plaintext (the only
  // path that returns plaintext). secret_nrn and masked fields are also
  // preserved for the caller's reference.
  Integration integration = 1;
}

// ============================================================================
// Service
// ============================================================================

service IntegrationService {
  // === Provider catalog (read-only) ===

  rpc GetProviders(ProvidersRequest) returns (ProvidersResponse) {
    option (google.api.http) = {get: "/v1/integration-providers"};
  }
  rpc GetProvider(.common.v1.Id) returns (Provider) {
    option (google.api.http) = {get: "/v1/integration-providers/{id}"};
  }

  // === Integration CRUD (user-callable) ===

  rpc GetIntegrations(IntegrationsRequest) returns (IntegrationsResponse) {
    option (google.api.http) = {get: "/v1/integrations"};
  }
  rpc GetIntegration(.common.v1.Id) returns (Integration) {
    option (google.api.http) = {get: "/v1/integrations/{id}"};
  }
  // Create or update. Uniqueness on (workspace_id, provider_id, level,
  // owner_member_id): a second call for the same tuple replaces the
  // existing row and rotates the underlying secrets.
  rpc SetIntegration(Integration) returns (.common.v1.Id) {
    option (google.api.http) = {
      post: "/v1/integrations"
      body: "*"
    };
  }
  // Hard delete. Removes the Integration row and emits IntegrationDeleted;
  // secret-manager listens and hard-deletes the underlying token secrets.
  rpc DeleteIntegration(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {delete: "/v1/integrations/{id}"};
  }

  // === Runtime access (BE-BE only, service-account auth required) ===

  // Resolves the right Integration for (workspace, provider, caller) and
  // returns plaintext credentials via secret-manager.
  // Resolution order: MEMBER (caller's user_nrn from gRPC metadata →
  // workspace_member_id) then WORKSPACE fallback.
  // Errors:
  //   NOT_FOUND           — neither MEMBER nor WORKSPACE integration exists.
  //   FAILED_PRECONDITION — resolved integration's expires_at is past.
  rpc AccessIntegration(AccessIntegrationRequest) returns (AccessIntegrationResponse) {
    option (google.api.http) = {
      post: "/v1/integrations:access"
      body: "*"
    };
  }

  // === GitHub-specific helpers (user-callable) ===

  // Resolves the caller's GitHub integration and returns the repo catalog.
  // If level is set, uses that integration exactly; otherwise defaults to
  // MEMBER-first with WORKSPACE fallback. The raw token is never returned.
  rpc GetGithubRepos(GithubReposRequest) returns (GithubReposResponse) {
    option (google.api.http) = {get: "/v1/integrations/github/repos"};
  }
}

// ============================================================================
// Request / Response — GitHub helpers
// ============================================================================

message GithubReposRequest {
  // Required.
  string workspace_id = 1;
  // Optional. When unset, defaults to MEMBER-first with WORKSPACE fallback.
  Integration.Level level = 2;
}

message GithubReposResponse {
  message Repo {
    // "owner/repo" — display name from GitHub API.
    string name           = 1;
    string clone_url      = 2;
    string default_branch = 3;
    bool   private        = 4;
  }
  repeated Repo repos = 1;
}
