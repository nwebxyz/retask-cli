syntax = "proto3";
package secret.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "common/v1/nrn.proto";

service SecretService {
  rpc SetSecret(Secret) returns (.common.v1.Id) {
    option (google.api.http) = {
      post: "/v1/secrets"
      body: "*"
    };
  }
  rpc GetSecret(.common.v1.Id) returns (Secret) {
    option (google.api.http) = {get: "/v1/secrets/{id}"};
  }
  rpc GetSecrets(SecretsRequest) returns (SecretsResponse) {
    option (google.api.http) = {get: "/v1/secrets"};
  }
  rpc AccessSecrets(AccessSecretsRequest) returns (AccessSecretsResponse) {
    option (google.api.http) = {
      post: "/v1/secrets:access"
      body: "*"
    };
  }
  rpc DeleteSecret(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {delete: "/v1/secrets/{id}"};
  }
  rpc CopySecret(CopySecretRequest) returns (Secret) {
    option (google.api.http) = {
      post: "/v1/secrets/{secret_id}:copy"
      body: "*"
    };
  }
}

message Secret {
  // @inject_tag: bson:"_id,omitempty"
  string secret_id = 1;
  // @inject_tag: bson:"workspace_id"
  string workspace_id = 2;
  // @inject_tag: bson:"related_to_nrn"
  .common.v1.Nrn related_to_nrn = 3;
  // @inject_tag: bson:"name"
  string name = 4;
  // @inject_tag: bson:"description"
  string description = 5;
  // @inject_tag: bson:"masked_value"
  string masked_value = 6;
  // @inject_tag: bson:"-"
  string value = 7;
  // @inject_tag: bson:"encrypted_value"
  bytes encrypted_value = 12;
  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn created_by_nrn = 8;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 9;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn updated_by_nrn = 10;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 11;
}

message SecretsRequest {
  message Filter {
    // Required. Scopes the query to a single workspace.
    string workspace_id = 1;
    // Required. Caller must already know the IDs — secrets are not enumerable.
    repeated string secret_ids = 2;
    // Optional. Restricts results to secrets owned by this resource NRN.
    .common.v1.Nrn related_to_nrn = 3;
  }
  Filter filter = 1;
}

message SecretsResponse {
  repeated Secret secrets = 1;
}

message CopySecretRequest {
  // Required. Workspace scope. Must match the source secret's workspace.
  string workspace_id = 1;
  // Required. The secret to copy from.
  string secret_id = 2;
  // Required. The expected owner of the source secret. Server verifies the
  // loaded source's related_to_nrn matches this — guards against the caller
  // asking to copy a secret it doesn't own.
  .common.v1.Nrn source_related_to_nrn = 3;
  // Required. The owner to assign to the new copy.
  .common.v1.Nrn target_related_to_nrn = 4;
}

message AccessSecretsRequest {
  string workspace_id = 1;
  repeated string secret_ids = 2;
}

message AccessSecretsResponse {
  repeated SecretAccess secrets = 1;
}

message SecretAccess {
  string secret_id = 1;
  string value = 2;
}

message WorkspaceEncryptionKey {
  // @inject_tag: bson:"_id,omitempty"
  string workspace_id = 1;
  // @inject_tag: bson:"wrapped_dek"
  bytes wrapped_dek = 2;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 3;
}
