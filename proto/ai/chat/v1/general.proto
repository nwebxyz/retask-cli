syntax = "proto3";
package ai.chat.v1;


import "google/protobuf/timestamp.proto";
import "common/v1/nrn.proto";
import "file/v1/file.proto";

message Thread {
  // @inject_tag: bson:"_id,omitempty"
  string thread_id = 1;
  // @inject_tag: bson:"workspace_id"
  string workspace_id = 2;
  // @inject_tag: bson:"title"
  string title = 3;
  // @inject_tag: bson:"need_generated_title"
  bool need_generated_title = 4;
  // @inject_tag: bson:"generated_title_at"
  google.protobuf.Timestamp generated_title_at = 5;
  // @inject_tag: bson:"agent_id"
  string agent_id = 6;
  // @inject_tag: bson:"fork_from_message_id"
  string fork_from_message_id = 7;
  // @inject_tag: bson:"is_pinned"
  bool is_pinned = 8;
  // @inject_tag: bson:"is_temporary"
  bool is_temporary = 9;

  // @inject_tag: bson:"created_by_nrn"
  common.v1.Nrn created_by_nrn = 10;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 11;
  // @inject_tag: bson:"updated_by_nrn"
  common.v1.Nrn updated_by_nrn = 12;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 13;
  // @inject_tag: bson:"is_deleted"
  bool is_deleted = 14;
}

message Message {
  // @inject_tag: bson:"_id,omitempty"
  string message_id = 1;
  // @inject_tag: bson:"thread_id"
  string thread_id = 2;
  // @inject_tag: bson:"content"
  string content = 3;
  // @inject_tag: bson:"attachments"
  repeated file.v1.FileInfo attachments = 4;

  // @inject_tag: bson:"created_by_nrn"
  common.v1.Nrn created_by_nrn = 5;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 6;
  // @inject_tag: bson:"updated_by_nrn"
  common.v1.Nrn updated_by_nrn = 7;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 8;
  // @inject_tag: bson:"is_deleted"
  bool is_deleted = 9;
}


message ChunkedMessage {
  string message_id = 1;
  string content = 2;
}

message EventMessage{
  enum Type {
    MESSAGE_ACK = 0;
    QUOTA_REACHED = 1;
    MODEL_NOT_AVAILABLE = 2;
    API_KEY_INVALID = 3;
    IGNORED_MESSAGES = 4;
    INVALID_MESSAGES = 5;
  }

  Type type = 1;
  string message = 2;
  repeated string ignored_message_ids = 3;
}
