syntax = "proto3";
package test.v1;

import "google/api/annotations.proto";
import "common/v1/common.proto";

message Sample {
  // @inject_tag: bson:"_id,omitempty"
  string id = 1;
  string name = 2;
  int64 num = 3;
  repeated int64 s_num = 4;
  bool enable = 5;
  Sample obj = 6;
  string long_string = 7;
}

// Service
service Test {
  rpc Test (Request) returns (Response) {
    option (google.api.http) = {
      post: "/v1/test"
      body: "*"
    };
  }
}

message Request {
  string service_name = 1;
}

message Response {
  bool success = 1;
  string error = 2;
}