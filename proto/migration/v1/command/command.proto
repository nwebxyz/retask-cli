syntax = "proto3";
package migration.v1.command;

import "google/protobuf/timestamp.proto";
import "common/v1/nrn.proto";

message NewMigration {
  //  Migrate only listed IDs. If empty, all tasks will be migrated.
  repeated string only_task_ids = 1;
  google.protobuf.Timestamp occurred_at = 2;
}
