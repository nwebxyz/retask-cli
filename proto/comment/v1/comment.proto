syntax = "proto3";
package comment.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "common/v1/nrn.proto";
import "common/v1/soft_delete.proto";
import "file/v1/file.proto";
import "auth/v1/user_access.proto";

service CommentService {
  rpc GetComments(CommentsRequest) returns (CommentsResponse) {
    option (google.api.http) = {get: "/v1/comments"};
  }
  rpc GetComment(.common.v1.Id) returns (Comment) {
    option (google.api.http) = {get: "/v1/comments/{id}"};
  }
  rpc SetComment(Comment) returns (.common.v1.Id) {
    option (google.api.http) = {
      post: "/v1/comments"
      body: "*"
    };
  }
  rpc DeleteComment(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {delete: "/v1/comments/{id}"};
  }
  rpc AddCommentAttachment(AddCommentAttachmentRequest) returns (Comment) {
    option (google.api.http) = {
      post: "/v1/comments/{comment_id}/attachments"
      body: "*"
    };
  }
  rpc DeleteCommentAttachment(DeleteCommentAttachmentRequest) returns (Comment) {
    option (google.api.http) = {
      delete: "/v1/comments/{comment_id}/attachments/{file_id}"
    };
  }
}

message Comment {
  // === Identity ===
  // @inject_tag: bson:"_id,omitempty"
  string comment_id        = 1;
  // @inject_tag: bson:"workspace_id"
  string workspace_id      = 2;
  // target_nrn is the commented-on resource. Today: a task NRN
  // "nweb:retask-task:task:<uuid>". Any future commentable resource is just
  // another NRN; the comment service routes access checks by target_nrn.service.
  // @inject_tag: bson:"target_nrn"
  .common.v1.Nrn target_nrn = 3;
  // Threading: empty = top-level comment; set = reply to a TOP-LEVEL comment on
  // the same target. Replies are one level deep (a reply cannot be replied to).
  // @inject_tag: bson:"parent_comment_id,omitempty"
  string parent_comment_id = 4;

  // === Content ===
  // body is the rich-text comment as an HTML string (TipTap getHTML() output),
  // identical format to task.description. Mentions are serialized inline as
  // <span data-type="mention" data-id="<member nrn>" data-label="<name>">@<name></span>.
  // @inject_tag: bson:"body"
  string body = 5;
  // mentioned_member_nrns is parsed server-side from body on every write.
  // Workspace Member NRN format "nweb:workspace:member:<uuid>". Derived index
  // for notifications (delivery deferred past v1); body remains source of truth.
  // @inject_tag: bson:"mentioned_member_nrns"
  repeated .common.v1.Nrn mentioned_member_nrns = 6;

  // === Attachments ===
  // Snapshot of FileInfo captured when each file was attached, like
  // task.attachments. Modified only via AddCommentAttachment / DeleteCommentAttachment.
  // @inject_tag: bson:"attachments"
  repeated file.v1.FileInfo attachments = 7;

  // === Edit indicator ===
  // is_edited becomes true the first time the comment's body or attachments
  // change after creation. FE renders an "Edited" label.
  // @inject_tag: bson:"is_edited"
  bool is_edited = 8;

  // === Audit / soft-delete ===
  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn created_by_nrn = 9;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 10;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn updated_by_nrn = 11;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 12;
  // @inject_tag: bson:"is_deleted"
  bool is_deleted = 13;
  // @inject_tag: bson:"deletion_info,omitempty"
  .common.v1.DeletionInfo deletion_info = 14;

  // === Computed on read — never persisted ===
  // Role-less entity → auth.v1.UserAccess directly.
  // can_edit = caller is created_by; can_delete = created_by OR admin on target.
  // @inject_tag: bson:"-"
  .auth.v1.UserAccess user_access = 15;
}

message CommentsRequest {
  message Filter {
    string workspace_id                     = 1;  // required scope (singular)
    .common.v1.Nrn target_nrn               = 2;  // required scope (singular)
    repeated string comment_ids             = 3;
    // parent_comment_id: omit = all; "" = top-level only; "<id>" = replies under it.
    string parent_comment_id                = 4;
    repeated .common.v1.Nrn created_by_nrns = 5;
  }
  enum Sort {
    SORT_DEFAULT         = 0;  // created_at DESC (newest first)
    SORT_CREATED_AT_ASC  = 1;
    SORT_CREATED_AT_DESC = 2;
  }
  Filter filter                    = 1;
  Sort sort                        = 2;
  .common.v1.Pagination pagination = 3;
}

message CommentsResponse {
  repeated Comment comments = 1;
}

message AddCommentAttachmentRequest {
  string comment_id = 1;
  string file_id    = 2;
}

message DeleteCommentAttachmentRequest {
  string comment_id = 1;
  string file_id    = 2;
}
