syntax = "proto3";
package auth.v1;

import "google/api/annotations.proto";
import "google/api/httpbody.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";
import "common/v1/nrn.proto";
import "common/v1/soft_delete.proto";

service AuthService {
  // === PAT management (FE, Firebase-authed) ===
  rpc GetPats(PatsRequest) returns (PatsResponse) {
    option (google.api.http) = {get: "/v1/auth/pats"};
  }
  rpc CreatePat(CreatePatRequest) returns (CreatePatResponse) {
    option (google.api.http) = {
      post: "/v1/auth/pats"
      body: "*"
    };
  }
  rpc RevokePat(.common.v1.Id) returns (.common.v1.Empty) {
    option (google.api.http) = {post: "/v1/auth/pats/{id}:revoke"};
  }

  // === Token exchange (CLI hot path; unauth endpoint) ===
  rpc ExchangePat(PatExchangeRequest) returns (AccessToken) {
    option (google.api.http) = {
      post: "/v1/auth/pat:exchange"
      body: "*"
    };
  }

  // === JWKS (public, no auth — ESP fetches this to validate tokens) ===
  rpc GetJwks(.common.v1.Empty) returns (google.api.HttpBody) {
    option (google.api.http) = {get: "/.well-known/jwks.json"};
  }

  // === Session PAT (BE-BE only — sandbox service only) ===

  // BE-BE only (service-account auth — sandbox service only).
  // Issues a SOURCE_SYSTEM PAT scoped to a single session.
  // The raw token is stored by sandbox service and returned via
  // GetSessionRuntime.nweb_api_key for the proxy to inject as NWEB_API_KEY.
  // NOT callable by end users, the FE, or the CLI.
  rpc IssueSessionPat(IssueSessionPatRequest) returns (IssueSessionPatResponse) {
    option (google.api.http) = {
      post: "/v1/auth/session-pats"
      body: "*"
    };
  }

  // BE-BE only (service-account auth — sandbox service only).
  // Mints a short-lived JWT directly from session context — no PAT created.
  // Use for ConnectSession; use IssueSessionPat for the long-lived nweb_api_key.
  // NOT callable by end users, the FE, or the CLI.
  rpc IssueSessionJwt(IssueSessionJwtRequest) returns (AccessToken) {
    option (google.api.http) = {
      post: "/v1/auth/session-jwts"
      body: "*"
    };
  }
}

// ============================================================================
// Scope (top-level enum — values prefixed per proto style guide)
// ============================================================================

// v1: single value — all permissions granted implicitly.
// Granular per-resource scopes are reserved for v2;
// see docs/architecture/auth.md for the reserved value list.
enum Scope {
  SCOPE_ALL = 0;
}

// ============================================================================
// Pat (Personal Access Token)
// ============================================================================

message Pat {
  enum Source {
    SOURCE_USER = 0;  // created by user via CreatePat; visible in FE UI
    SOURCE_SYSTEM = 1;  // created by platform via IssueSessionPat; excluded from GetPats
  }

  // @inject_tag: bson:"_id,omitempty"
  string pat_id = 1;
  // Empty = no restriction (valid for any workspace the owner belongs to).
  // Non-empty = token is only exchangeable for this workspace.
  // @inject_tag: bson:"workspace_id"
  string workspace_id = 2;
  // @inject_tag: bson:"owner_nrn"
  .common.v1.Nrn owner_nrn = 3;
  // @inject_tag: bson:"name"
  string name = 4;
  // @inject_tag: bson:"description"
  string description = 5;
  // HMAC-SHA256(raw_token, server_pepper) hex-encoded. Indexed, never returned.
  // @inject_tag: bson:"token_hash"
  string token_hash = 6;
  // Display-only masked form, e.g. "nweb_pat_••••••••9k2m".
  // @inject_tag: bson:"masked_value"
  string masked_value = 7;
  // @inject_tag: bson:"scopes"
  repeated Scope scopes = 8;
  // Optional expiry; absent = no expiry.
  // @inject_tag: bson:"expires_at,omitempty"
  google.protobuf.Timestamp expires_at = 9;
  // Updated by ExchangePat on each successful exchange.
  // @inject_tag: bson:"last_used_at,omitempty"
  google.protobuf.Timestamp last_used_at = 10;
  // @inject_tag: bson:"source"
  Source source = 11;
  // Only set for SOURCE_SYSTEM. Used to find and revoke the PAT on SessionStopped.
  // @inject_tag: bson:"session_id,omitempty"
  string session_id = 12;
  // Audit
  // @inject_tag: bson:"created_by_nrn"
  .common.v1.Nrn created_by_nrn = 13;
  // @inject_tag: bson:"created_at"
  google.protobuf.Timestamp created_at = 14;
  // @inject_tag: bson:"updated_by_nrn"
  .common.v1.Nrn updated_by_nrn = 15;
  // @inject_tag: bson:"updated_at"
  google.protobuf.Timestamp updated_at = 16;
  // Soft delete. Revoke = soft-delete; row kept for audit of last_used_at.
  // @inject_tag: bson:"is_deleted"
  bool is_deleted = 17;
  // @inject_tag: bson:"deletion_info,omitempty"
  .common.v1.DeletionInfo deletion_info = 18;
}

// ============================================================================
// AccessToken (short-lived JWT — not persisted; claims documented in auth.md)
// ============================================================================

message AccessToken {
  string jwt = 1;
  google.protobuf.Timestamp expires_at = 2;
}

// ============================================================================
// Request / Response — PAT management
// ============================================================================

message PatsRequest {
  message Filter {
    string workspace_id = 1;
    repeated string pat_ids = 2;
    // Any-match on scopes.
    repeated Scope has_scopes = 3;
  }
  enum Sort {
    DEFAULT = 0;
    CREATED_AT_ASC = 1;
    CREATED_AT_DESC = 2;
    LAST_USED_AT_ASC = 3;
    LAST_USED_AT_DESC = 4;
  }
  Filter filter = 1;
  Sort sort = 2;
  .common.v1.Pagination pagination = 3;
}

message PatsResponse {
  // token_hash is always stripped before return.
  repeated Pat pats = 1;
}

message CreatePatRequest {
  // Optional. Restricts PAT to a specific workspace. Empty = all workspaces the user belongs to.
  string workspace_id = 1;
  string name = 2;
  string description = 3;
  repeated Scope scopes = 4;
  // Optional; absent = no expiry.
  google.protobuf.Timestamp expires_at = 5;
}

message CreatePatResponse {
  // token_hash stripped.
  Pat pat = 1;
  // The one-time raw "nweb_pat_..." — returned once, never again.
  string raw_token = 2;
}

// ============================================================================
// Request — Token exchange
// ============================================================================

message PatExchangeRequest {
  // Raw "nweb_pat_...".
  string token = 1;
  // Workspace to scope the minted JWT for.
  // Must equal Pat.workspace_id (or workspace_id must be empty).
  // Pat.owner_nrn must be a member of this workspace.
  string workspace_id = 2;
}

// ============================================================================
// Request / Response — Session PAT (BE-BE only)
// ============================================================================

message IssueSessionPatRequest {
  // Session owner — becomes the sub claim in JWTs minted from this PAT.
  .common.v1.Nrn user_nrn = 1;
  string         session_id = 2;
  string         workspace_id = 3;
  string         name = 4;
  string         description = 5;
  repeated Scope scopes = 6;
  // Optional; absent = no expiry.
  google.protobuf.Timestamp expires_at = 7;
}

message IssueSessionPatResponse {
  // Raw "nweb_pat_..." — caller must store securely and never log.
  // Returned once; not stored in plaintext by auth service.
  string                    raw_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message IssueSessionJwtRequest {
  .common.v1.Nrn            user_nrn     = 1;
  string                    workspace_id = 2;
  string                    session_id   = 3;
  repeated Scope            scopes       = 4;
  google.protobuf.Timestamp expires_at   = 5;
}
