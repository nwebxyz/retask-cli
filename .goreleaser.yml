version: 2

project_name: retask

before:
  hooks:
    - go mod tidy

builds:
  - id: retask
    main: ./cmd/retask/
    binary: retask
    ldflags:
      - -s -w -X nweb.xyz/retask-cli/internal/version.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: retask
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "sha256sums.txt"
  algorithm: sha256

release:
  github:
    owner: nwebxyz
    name: retask-cli
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
